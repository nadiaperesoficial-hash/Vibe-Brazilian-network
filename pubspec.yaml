name: vibe

description: Vibe - Rede social brasileira.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get: ^4.7.3
  get_it: ^9.2.1
  get_storage: ^2.1.1

  # Firebase (auth, database, notifications — SEM storage)
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.1

  # Cloudinary (substitui firebase_storage)
  cloudinary_flutter: ^1.3.0
  cloudinary_url_gen: ^1.5.0

  # Media
  image_picker: ^1.2.1
  image_picker_plus: ^0.5.10+1
  flutter_image_compress: ^2.4.0
  video_player: ^2.11.0
  video_thumbnail: ^0.5.6
  cached_network_image: ^3.4.1
  blurhash: ^1.2.0
  flutter_blurhash: ^0.9.1

  # Audio/Video call
  agora_rtc_engine: ^6.5.3
  audioplayers: ^6.5.1
  audio_video_progress_bar: ^2.0.3
  record: ^6.2.0

  # UI
  flutter_svg: ^2.2.3
  shimmer: ^3.0.0
  readmore: ^3.0.0
  animated_text_kit: ^4.3.0
  animated_splash_screen: ^1.3.0
  carousel_slider: ^5.1.2
  flutter_staggered_grid_view: ^0.7.0
  scrollable_positioned_list: ^0.3.8
  overlay_support: ^2.1.0
  flutter_local_notifications: ^20.1.0

  # Utils
  fluttertoast: ^9.0.0
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  easy_localization: ^3.0.8
  flutter_phoenix: ^1.1.1
  pull_to_refresh:
    git:
      url: https://github.com/peng8350/flutter_pulltorefresh
  inview_notifier_list: ^3.0.0

  # Link preview (novo — para posts com links)
  any_link_preview: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/instagram.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/play_store_512.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/splash/
